<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Central de Simuladores Elétricos</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 255, 0.20), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 120, 255, 0.22), transparent 35%),
        linear-gradient(135deg, #020617, #07111f, #020617);
      color: #ffffff;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1250px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
      padding: 34px 18px;
      border-radius: 24px;
      border: 1px solid rgba(0, 238, 255, 0.28);
      background: rgba(255, 255, 255, 0.045);
      box-shadow: 0 0 35px rgba(0, 238, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    header .logo {
      width: 82px;
      height: 82px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #00eaff, #00ff9d);
      color: #001018;
      font-size: 2.1rem;
      font-weight: bold;
      box-shadow: 0 0 28px rgba(0, 234, 255, 0.45);
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3.7rem);
      color: #00eaff;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    header p {
      color: #b7d7e8;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      line-height: 1.5;
      max-width: 850px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 260px;
    }

    .search-box input {
      width: 100%;
      padding: 15px 18px;
      border-radius: 14px;
      border: 1px solid rgba(0, 255, 255, 0.32);
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
      font-size: 1rem;
    }

    .search-box input::placeholder {
      color: #91a8b7;
    }

    .contador {
      padding: 15px 18px;
      border-radius: 14px;
      border: 1px solid rgba(0, 255, 157, 0.26);
      background: rgba(0, 255, 157, 0.08);
      color: #00ff9d;
      font-weight: bold;
      white-space: nowrap;
    }

    .categorias {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 26px;
      justify-content: center;
    }

    .categoria-btn {
      border: 1px solid rgba(0, 234, 255, 0.28);
      background: rgba(255, 255, 255, 0.06);
      color: #c9e8f5;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      font-size: 0.88rem;
    }

    .categoria-btn:hover,
    .categoria-btn.ativo {
      background: linear-gradient(90deg, #00eaff, #00ff9d);
      color: #001018;
      border-color: transparent;
      box-shadow: 0 0 18px rgba(0, 234, 255, 0.26);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(275px, 1fr));
      gap: 18px;
    }

    .card {
      min-height: 210px;
      padding: 22px;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.085), rgba(255,255,255,0.028));
      border: 1px solid rgba(0, 255, 255, 0.18);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.06);
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0, 234, 255, 0.08);
      top: -45px;
      right: -45px;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #00eaff;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.24);
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(0, 234, 255, 0.12);
      color: #00eaff;
      font-size: 0.78rem;
      border: 1px solid rgba(0, 234, 255, 0.25);
      font-weight: bold;
    }

    .card h2 {
      font-size: 1.15rem;
      color: #ffffff;
      margin-bottom: 10px;
      line-height: 1.25;
      position: relative;
      z-index: 1;
    }

    .card p {
      color: #a9c0cf;
      font-size: 0.93rem;
      line-height: 1.45;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .card a {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      padding: 13px 16px;
      border-radius: 13px;
      color: #001018;
      background: linear-gradient(90deg, #00eaff, #00ff9d);
      font-weight: bold;
      transition: 0.2s;
      position: relative;
      z-index: 1;
    }

    .card a:hover {
      filter: brightness(1.12);
      transform: scale(1.025);
    }

    .vazio {
      text-align: center;
      padding: 40px 20px;
      border-radius: 18px;
      border: 1px dashed rgba(0, 234, 255, 0.25);
      color: #aac9d8;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      margin-top: 36px;
      color: #7894a4;
      font-size: 0.9rem;
      padding-bottom: 20px;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      header {
        padding: 26px 14px;
      }

      .contador {
        width: 100%;
        text-align: center;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <header>
      <div class="logo">⚡</div>
      <h1>Central de Simuladores Elétricos</h1>
      <p>
        Plataforma didática para acesso rápido aos simuladores de eletricidade,
        grandezas elétricas, potência, fotovoltaica, IoT, proteção, SPDA,
        instrumentação e automação.
      </p>
    </header>

    <section class="top-bar">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Pesquisar simulador por nome, categoria ou descrição..."
          onkeyup="filtrarSimuladores()"
        />
      </div>

      <div class="contador" id="contadorSimuladores">
        0 simuladores
      </div>
    </section>

    <section class="categorias" id="categorias"></section>

    <main class="grid" id="simuladoresGrid"></main>

    <footer>
      Desenvolvido para acesso rápido aos simuladores didáticos.
    </footer>

  </div>

  <script>
    const simuladores = [
      {
        titulo: "Dashboard de Monitoramento IoT",
        descricao: "Painel didático para monitoramento simulado de variáveis IoT.",
        arquivo: "Dashboards de Monitoramento IoT Simulado.HTML",
        categoria: "IoT"
      },
      {
        titulo: "Demonstrador CA-CC",
        descricao: "Simulador para estudo de corrente alternada e corrente contínua.",
        arquivo: "Demonstrador_CA-CC.HTML",
        categoria: "Eletricidade"
      },
      {
        titulo: "Dimensionamento Fotovoltaico",
        descricao: "Ferramenta didática para apoio ao dimensionamento de sistemas fotovoltaicos.",
        arquivo: "Dimensionamento Fotovoltaico.HTML",
        categoria: "Fotovoltaico"
      },
      {
        titulo: "Duoeletro Innovation",
        descricao: "Ambiente interativo para estudos de eletricidade e inovação tecnológica.",
        arquivo: "Duoeletro Innovation.html",
        categoria: "Inovação"
      },
      {
        titulo: "Lei de Ohm",
        descricao: "Simulador do ecossistema elétrico com tensão, corrente e resistência.",
        arquivo: "Ecossistema Elétrico - Lei de Ohm.HTML",
        categoria: "Grandezas"
      },
      {
        titulo: "Coordenograma e Seletividade",
        descricao: "Estudo didático de proteção elétrica, seletividade e coordenação.",
        arquivo: "Estudo de Coordenograma e Seletividade.html",
        categoria: "Proteção"
      },
      {
        titulo: "Fator de Potência",
        descricao: "Simulador para análise de fator de potência e correção.",
        arquivo: "Fator de Potência.html",
        categoria: "Potência"
      },
      {
        titulo: "Fator de Potência - Banco Didático",
        descricao: "Simulador complementar para estudo de fator de potência.",
        arquivo: "fator_potencia.html",
        categoria: "Potência"
      },
      {
        titulo: "Gerador de Código para ESP32",
        descricao: "Ferramenta para gerar códigos didáticos para ESP32.",
        arquivo: "Gerador de Código para ESP32.HTML",
        categoria: "IoT"
      },
      {
        titulo: "Guia de Dimensionamento de Condutores",
        descricao: "Guia interativo para estudo e dimensionamento de condutores elétricos.",
        arquivo: "Guia Interativo de Dimensionamento de condutores.HTML",
        categoria: "Instalações"
      },
      {
        titulo: "IoT Edu - Gerador de Código para ESP32",
        descricao: "Gerador educacional de código para aplicações IoT com ESP32.",
        arquivo: "IoT Edu – Gerador de Código para ESP32.HTML",
        categoria: "IoT"
      },
      {
        titulo: "Leis de Kirchhoff",
        descricao: "Simulador didático para estudo da Lei dos Nós e da Lei das Malhas.",
        arquivo: "Leis de Kirchhoff.html",
        categoria: "Circuitos"
      },
      {
        titulo: "Modelos Atômicos Tridimensionais",
        descricao: "Simulador visual para estudo de modelos atômicos.",
        arquivo: "Modelos atômicos tridimensionais.html",
        categoria: "Ciências"
      },
      {
        titulo: "Triângulo de Potência",
        descricao: "Simulador de potência ativa, reativa e aparente.",
        arquivo: "Potências Elétricas - Triângulo de Potência.HTML",
        categoria: "Potência"
      },
      {
        titulo: "Aterramento e SPDA",
        descricao: "Simulador didático sobre aterramento elétrico e proteção contra descargas atmosféricas.",
        arquivo: "Simulador Didático -Aterramento e SPDA.HTML",
        categoria: "SPDA"
      },
      {
        titulo: "Simulador de Pilhas",
        descricao: "Estudo interativo sobre pilhas, tensão e associação.",
        arquivo: "Simulador de Pilhas.html",
        categoria: "Eletroquímica"
      },
      {
        titulo: "Analisador Elétrico",
        descricao: "Ferramenta didática para análise de grandezas elétricas.",
        arquivo: "analisador.html",
        categoria: "Medições"
      },
      {
        titulo: "Banco de Capacitores",
        descricao: "Simulador para estudo de banco de capacitores e correção de fator de potência.",
        arquivo: "banco_capacitores.html",
        categoria: "Potência"
      },
      {
        titulo: "Corrente Elétrica",
        descricao: "Simulador para estudo da corrente elétrica.",
        arquivo: "corrente elétrica.html",
        categoria: "Grandezas"
      },
      {
        titulo: "Eletricidade",
        descricao: "Ambiente didático sobre fundamentos da eletricidade.",
        arquivo: "eletricidade.html",
        categoria: "Eletricidade"
      },
      {
        titulo: "Osciloscópio",
        descricao: "Simulador didático para visualização de sinais elétricos.",
        arquivo: "osciloscopio.html",
        categoria: "Instrumentação"
      },
      {
        titulo: "Simuladores de Grandezas",
        descricao: "Central de estudos sobre tensão, corrente, resistência, potência ativa, reativa e aparente.",
        arquivo: "simuladores de grandezas.html",
        categoria: "Grandezas"
      }
    ];

    const grid = document.getElementById("simuladoresGrid");
    const contador = document.getElementById("contadorSimuladores");
    const categoriasContainer = document.getElementById("categorias");
    const searchInput = document.getElementById("searchInput");

    let categoriaAtual = "Todos";

    function criarCategorias() {
      const categorias = ["Todos", ...new Set(simuladores.map(item => item.categoria))];

      categoriasContainer.innerHTML = "";

      categorias.forEach(categoria => {
        const botao = document.createElement("button");
        botao.className = "categoria-btn";
        botao.textContent = categoria;

        if (categoria === categoriaAtual) {
          botao.classList.add("ativo");
        }

        botao.onclick = () => {
          categoriaAtual = categoria;
          criarCategorias();
          filtrarSimuladores();
        };

        categoriasContainer.appendChild(botao);
      });
    }

    function carregarSimuladores(lista) {
      grid.innerHTML = "";

      contador.textContent = lista.length === 1
        ? "1 simulador"
        : lista.length + " simuladores";

      if (lista.length === 0) {
        grid.innerHTML = `
          <div class="vazio">
            Nenhum simulador encontrado. Tente pesquisar por outro nome ou categoria.
          </div>
        `;
        return;
      }

      lista.forEach(simulador => {
        const card = document.createElement("section");
        card.className = "card";

        const linkSeguro = encodeURI(simulador.arquivo);

        card.innerHTML = `
          <div>
            <span class="tag">${simulador.categoria}</span>
            <h2>${simulador.titulo}</h2>
            <p>${simulador.descricao}</p>
          </div>

          <a href="${linkSeguro}" target="_blank" rel="noopener noreferrer">
            Acessar simulador
          </a>
        `;

        grid.appendChild(card);
      });
    }

    function filtrarSimuladores() {
      const termo = searchInput.value.toLowerCase().trim();

      const filtrados = simuladores.filter(simulador => {
        const correspondeTexto =
          simulador.titulo.toLowerCase().includes(termo) ||
          simulador.descricao.toLowerCase().includes(termo) ||
          simulador.categoria.toLowerCase().includes(termo);

        const correspondeCategoria =
          categoriaAtual === "Todos" || simulador.categoria === categoriaAtual;

        return correspondeTexto && correspondeCategoria;
      });

      carregarSimuladores(filtrados);
    }

    criarCategorias();
    carregarSimuladores(simuladores);
  </script>
</body>
</html>
