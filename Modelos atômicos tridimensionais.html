<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Periódico3D - Tabela Periódica Interativa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0c1427, #1a2a4a, #2c3e50);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0,180,255,0.8);
            background: linear-gradient(to right, #4fc3f7, #29b6f6, #03a9f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            color: #bbdefb;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 4px;
            max-width: 1200px;
            margin: 20px auto;
        }
        .element {
            width: 50px;
            height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: bold;
            font-size: 0.85rem;
            text-align: center;
            background: rgba(30, 60, 100, 0.6);
            border: 1px solid rgba(100, 180, 255, 0.4);
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .element:hover {
            transform: scale(1.2);
            z-index: 10;
            background: rgba(0, 120, 255, 0.7);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.9);
            border-color: rgba(255, 255, 255, 0.7);
        }
        .element .number {
            font-size: 0.7rem;
            opacity: 0.85;
        }
        .element .symbol {
            font-size: 1.15rem;
            font-weight: bold;
        }
        .viewer-container {
            width: 100%;
            max-width: 800px;
            height: 450px;
            margin: 25px auto;
            background: rgba(10, 20, 40, 0.5);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 180, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        #atomCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .info-panel {
            max-width: 800px;
            margin: 25px auto;
            background: rgba(15, 30, 60, 0.65);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(100, 180, 255, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }
        .info-panel h2 {
            margin-bottom: 12px;
            color: #81d4fa;
            font-size: 1.8rem;
        }
        .info-panel p {
            margin: 8px 0;
            line-height: 1.6;
            color: #e3f2fd;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .periodic-table {
                grid-template-columns: repeat(10, 1fr);
                gap: 2px;
            }
            .element {
                width: 36px;
                height: 36px;
                font-size: 0.65rem;
            }
            .viewer-container {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔬 Periódico3D</h1>
        <p class="subtitle">Modelos atômicos tridimensionais realistas e interativos para educação técnica</p>
    </header>

    <div class="container">
        <div class="periodic-table" id="periodicTable"></div>

        <div class="viewer-container">
            <canvas id="atomCanvas"></canvas>
        </div>

        <div class="info-panel hidden" id="infoPanel">
            <h2 id="elementName">Hidrogênio</h2>
            <p><strong>Símbolo:</strong> <span id="elementSymbol">H</span></p>
            <p><strong>Número Atômico:</strong> <span id="atomicNumber">1</span></p>
            <p><strong>Massa Atômica:</strong> <span id="atomicMass">1.008 u</span></p>
            <p id="description">O hidrogênio é o elemento mais leve e abundante do universo. Usado em células de combustível para energia limpa.</p>
        </div>
    </div>

    <script>
        // Dados dos elementos
        const elements = [
            { number: 1, symbol: 'H', name: 'Hidrogênio', mass: '1.008', config: [1], desc: 'O mais leve e abundante. Combustível para foguetes e células de hidrogênio.' },
            { number: 2, symbol: 'He', name: 'Hélio', mass: '4.0026', config: [2], desc: 'Gás nobre, usado em balões e resfriamento de supercondutores.' },
            { number: 3, symbol: 'Li', name: 'Lítio', mass: '6.94', config: [2,1], desc: 'Essencial para baterias de íon-lítio em veículos elétricos.' },
            { number: 4, symbol: 'Be', name: 'Berílio', mass: '9.0122', config: [2,2], desc: 'Usado em ligas leves e componentes aeroespaciais.' },
            { number: 5, symbol: 'B', name: 'Boro', mass: '10.81', config: [2,3], desc: 'Aplicações em semicondutores e isolantes térmicos.' },
            { number: 6, symbol: 'C', name: 'Carbono', mass: '12.011', config: [2,4], desc: 'Base da química orgânica e materiais como grafeno.' },
            { number: 7, symbol: 'N', name: 'Nitrogênio', mass: '14.007', config: [2,5], desc: 'Componente do ar; usado em fertilizantes e explosivos.' },
            { number: 8, symbol: 'O', name: 'Oxigênio', mass: '15.999', config: [2,6], desc: 'Essencial para a respiração e combustão.' },
            { number: 9, symbol: 'F', name: 'Flúor', mass: '18.998', config: [2,7], desc: 'Altamente reativo; usado em pastas de dente e Teflon.' },
            { number: 10, symbol: 'Ne', name: 'Neônio', mass: '20.180', config: [2,8], desc: 'Gás nobre que brilha em anúncios luminosos.' },
            { number: 11, symbol: 'Na', name: 'Sódio', mass: '22.990', config: [2,8,1], desc: 'Metal alcalino reativo; essencial na alimentação.' },
            { number: 12, symbol: 'Mg', name: 'Magnésio', mass: '24.305', config: [2,8,2], desc: 'Importante em ligas leves e clorofila.' },
            { number: 13, symbol: 'Al', name: 'Alumínio', mass: '26.982', config: [2,8,3], desc: 'Metal leve e reciclável; usado em aeronaves e embalagens.' },
            { number: 14, symbol: 'Si', name: 'Silício', mass: '28.085', config: [2,8,4], desc: 'Base da eletrônica e painéis solares fotovoltaicos.' },
            { number: 15, symbol: 'P', name: 'Fósforo', mass: '30.974', config: [2,8,5], desc: 'Presente em DNA e fertilizantes.' },
            { number: 16, symbol: 'S', name: 'Enxofre', mass: '32.06', config: [2,8,6], desc: 'Usado na produção de ácido sulfúrico e vulcanização da borracha.' },
            { number: 17, symbol: 'Cl', name: 'Cloro', mass: '35.45', config: [2,8,7], desc: 'Desinfetante de água e matéria-prima para plásticos.' },
            { number: 18, symbol: 'Ar', name: 'Argônio', mass: '39.948', config: [2,8,8], desc: 'Gás inerte usado em soldagem e lâmpadas.' },
            { number: 19, symbol: 'K', name: 'Potássio', mass: '39.098', config: [2,8,8,1], desc: 'Essencial para funções celulares e fertilizantes.' },
            { number: 20, symbol: 'Ca', name: 'Cálcio', mass: '40.078', config: [2,8,8,2], desc: 'Fundamental para ossos e cimentos.' },
            { number: 26, symbol: 'Fe', name: 'Ferro', mass: '55.845', config: [2,8,14,2], desc: 'Base do aço; crucial na indústria e transporte.' },
            { number: 29, symbol: 'Cu', name: 'Cobre', mass: '63.546', config: [2,8,18,1], desc: 'Excelente condutor elétrico; usado em redes de energia.' },
            { number: 47, symbol: 'Ag', name: 'Prata', mass: '107.87', config: [2,8,18,18,1], desc: 'Melhor condutor térmico e elétrico; usado em fotovoltaicos.' },
            { number: 79, symbol: 'Au', name: 'Ouro', mass: '196.97', config: [2,8,18,32,18,1], desc: 'Resistente à corrosão; usado em eletrônica de alta confiabilidade.' },
            { number: 82, symbol: 'Pb', name: 'Chumbo', mass: '207.2', config: [2,8,18,32,18,4], desc: 'Denso e tóxico; antes usado em baterias e blindagem.' }
        ];

        const positions = {
            1: { row: 1, col: 1 }, 2: { row: 1, col: 18 },
            3: { row: 2, col: 1 }, 4: { row: 2, col: 2 },
            5: { row: 2, col: 13 }, 6: { row: 2, col: 14 },
            7: { row: 2, col: 15 }, 8: { row: 2, col: 16 },
            9: { row: 2, col: 17 }, 10: { row: 2, col: 18 },
            11: { row: 3, col: 1 }, 12: { row: 3, col: 2 },
            13: { row: 3, col: 13 }, 14: { row: 3, col: 14 },
            15: { row: 3, col: 15 }, 16: { row: 3, col: 16 },
            17: { row: 3, col: 17 }, 18: { row: 3, col: 18 },
            19: { row: 4, col: 1 }, 20: { row: 4, col: 2 },
            26: { row: 4, col: 8 }, 29: { row: 4, col: 11 },
            47: { row: 5, col: 11 }, 79: { row: 6, col: 11 },
            82: { row: 6, col: 14 }
        };

        // Inicializa a tabela
        const table = document.getElementById('periodicTable');
        const rows = 7;
        const cols = 18;

        for (let r = 1; r <= rows; r++) {
            for (let c = 1; c <= cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'element empty';
                table.appendChild(cell);
            }
        }

        elements.forEach(el => {
            const pos = positions[el.number];
            if (pos) {
                const index = (pos.row - 1) * cols + (pos.col - 1);
                const cell = table.children[index];
                cell.className = 'element';
                cell.innerHTML = `<div class="number">${el.number}</div><div class="symbol">${el.symbol}</div>`;
                cell.dataset.element = el.number;
                cell.addEventListener('click', () => showElement(el));
            }
        });

        // Configuração Three.js
        let scene, camera, renderer, nucleus, orbits = [], electrons = [];
        let currentElement = elements[0];

        function initThreeJS() {
            const canvas = document.getElementById('atomCanvas');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1428);

            camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Luzes
            const ambientLight = new THREE.AmbientLight(0x404040, 1.2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00aaff, 1.5);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            const pointLight2 = new THREE.PointLight(0xff4400, 0.8);
            pointLight2.position.set(-10, -10, -10);
            scene.add(pointLight2);

            window.addEventListener('resize', () => {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            });
        }

        function clearAtom() {
            if (nucleus) scene.remove(nucleus);
            orbits.forEach(o => scene.remove(o));
            electrons.forEach(e => scene.remove(e));
            orbits = [];
            electrons = [];
        }

        function createAtom(el) {
            clearAtom();

            // Núcleo
            const nucleusGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const nucleusMat = new THREE.MeshPhongMaterial({
                color: 0xff5252,
                emissive: 0x400000,
                shininess: 90
            });
            nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
            scene.add(nucleus);

            const config = el.config;
            const maxRadius = 8;
            const orbitSpacing = maxRadius / config.length;

            config.forEach((electronCount, shellIndex) => {
                const radius = (shellIndex + 1) * orbitSpacing;

                // Órbita (anel)
                const orbitGeometry = new THREE.RingGeometry(radius - 0.05, radius, 64);
                const orbitMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00aaff,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.25
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);
                orbits.push(orbit);

                // Elétrons
                for (let i = 0; i < electronCount; i++) {
                    const angle = (i / electronCount) * Math.PI * 2;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);

                    const electronGeo = new THREE.SphereGeometry(0.25, 16, 16);
                    const electronMat = new THREE.MeshPhongMaterial({
                        color: 0x00e5ff,
                        emissive: 0x0044aa,
                        shininess: 100
                    });
                    const electron = new THREE.Mesh(electronGeo, electronMat);
                    electron.position.set(x, y, 0);
                    scene.add(electron);
                    electrons.push({
                        mesh: electron,
                        radius: radius,
                        angle: angle,
                        speed: 0.02 + (Math.random() * 0.02)
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Animação suave dos elétrons
            electrons.forEach(e => {
                e.angle += e.speed;
                e.mesh.position.x = e.radius * Math.cos(e.angle);
                e.mesh.position.y = e.radius * Math.sin(e.angle);
            });

            // Rotação lenta do átomo
            orbits.forEach(o => o.rotation.z += 0.002);
            electrons.forEach(e => e.mesh.rotation.y += 0.02);

            renderer.render(scene, camera);
        }

        function showElement(el) {
            currentElement = el;
            document.getElementById('elementName').textContent = el.name;
            document.getElementById('elementSymbol').textContent = el.symbol;
            document.getElementById('atomicNumber').textContent = el.number;
            document.getElementById('atomicMass').textContent = el.mass + ' u';
            document.getElementById('description').textContent = el.desc;
            document.getElementById('infoPanel').classList.remove('hidden');

            createAtom(el);
        }

        // Inicialização
        initThreeJS();
        showElement(elements[0]);
        animate();
    </script>
</body>
</html>
